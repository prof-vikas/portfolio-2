<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikas Mourya — Portfolio</title>
  <meta name="description" content="Vikas Mourya — Portfolio coming soon. Get in touch via email."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e2d9;
      --muted: #6b6560;
      --accent: #c8a97a;
      --accent-dim: rgba(200, 169, 122, 0.12);
      --mono: 'DM Mono', monospace;
      --serif: 'Cormorant Garamond', Georgia, serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Subtle radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(200,169,122,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      z-index: 1;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.4rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(10,10,10,0.7);
      z-index: 50;
      animation: slideDown 0.8s ease both;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Main card ── */
    .card {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .name {
      font-family: var(--serif);
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.9s 0.35s ease both;
    }

    .name em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      margin: 2rem auto;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      animation: fadeIn 0.9s 0.55s ease both;
    }

    .tagline {
      font-family: var(--serif);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 300;
      line-height: 1.75;
      color: var(--muted);
      max-width: 460px;
      margin: 0 auto 3rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s ease both;
    }

    /* ── Under construction notice ── */
    .notice-box {
      border: 1px solid var(--border);
      background: var(--accent-dim);
      padding: 1.2rem 1.8rem;
      margin-bottom: 2.8rem;
      display: inline-block;
      opacity: 0;
      animation: fadeUp 0.9s 0.65s ease both;
    }

    .notice-box p {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── CTA ── */
    .cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.8s ease both;
    }

    .cta-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .email-link {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.2rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease;
    }

    .email-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.35s ease;
    }

    .email-link:hover::before { transform: translateX(0); }
    .email-link:hover { color: var(--bg); }

    .email-link span, .email-link svg {
      position: relative; z-index: 1;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s;
    }

    footer a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 28px; height: 28px;
      opacity: 0.3;
      z-index: 2;
    }
    .corner--tl { top: 4.5rem; left: 1.2rem; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner--tr { top: 4.5rem; right: 1.2rem; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner--bl { bottom: 3rem; left: 1.2rem; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner--br { bottom: 3rem; right: 1.2rem; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .topbar { padding: 1rem 1.2rem; }
      .corner { display: none; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <span class="logo">vikasmourya.in</span>
    <span class="status-pill">
      <span class="dot"></span>
      Portfolio in progress
    </span>
  </header>

  <!-- Corner accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Main content -->
  <main class="wrapper">
    <div class="card">

      <p class="eyebrow">Hello, World &mdash; I am</p>

      <h1 class="name">Vikas<br><em>Mourya</em></h1>

      <div class="divider"></div>

      <p class="tagline">
        Something thoughtful is being crafted here.<br>
        Check back soon — good things take time.
      </p>

      <div class="notice-box">
        <p>&#9632;&nbsp; Portfolio under development &nbsp;&#9632;</p>
      </div>

      <div class="cta-group">
        <span class="cta-label">In the meantime, reach out</span>
        <a class="email-link" href="mailto:vikas.mourya@protonmail.com">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <span>vikas.mourya@protonmail.com</span>
        </a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Vikas Mourya &nbsp;&mdash;&nbsp; <a href="https://vikasmourya.in">vikasmourya.in</a></p>
  </footer>

</body>
</html>
